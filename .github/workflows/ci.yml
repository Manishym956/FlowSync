name: FlowSync CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI (Types, Tests & Build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowsync
          POSTGRES_PASSWORD: flowsync_dev_pass
          POSTGRES_DB: flowsync
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        cwd: backend
        run: npm ci

      - name: Generate Prisma Client & Migrate Test DB
        cwd: backend
        env:
          DATABASE_URL: postgresql://flowsync:flowsync_dev_pass@localhost:5433/flowsync?schema=public
        run: |
          npx prisma generate
          npx prisma migrate db push

      - name: Type-Check Backend Code
        cwd: backend
        run: npm run lint

      - name: Run Backend Test Suite (Unit & Integration)
        cwd: backend
        env:
          DATABASE_URL: postgresql://flowsync:flowsync_dev_pass@localhost:5433/flowsync?schema=public
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          API_KEY: dev-api-key-change-in-production
          WEBHOOK_SECRET: dev-webhook-secret-change-in-production
          FHIR_BASE_URL: https://hapi.fhir.org/baseR4
          RANDOM_USER_API_URL: https://randomuser.me/api/
          RESEND_API_KEY: mock-mode
        run: npm test

      - name: Build Backend Distribution
        cwd: backend
        run: npm run build

  frontend-ci:
    name: Frontend CI (Types, Tests & Next.js Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        cwd: frontend
        run: npm ci

      - name: Run Frontend Vitest Unit Tests
        cwd: frontend
        run: npm test

      - name: Build Next.js Production App
        cwd: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: /api
          BACKEND_API_URL: http://localhost:3001
          API_KEY: dev-api-key-change-in-production
        run: npm run build
