services:
  postgres:
    image: postgres:16-alpine
    container_name: flowsync-postgres
    environment:
      POSTGRES_USER: flowsync
      POSTGRES_PASSWORD: flowsync_password
      POSTGRES_DB: flowsync
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowsync -d flowsync']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowsync-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  flowsync-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: flowsync-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://flowsync:flowsync_password@postgres:5432/flowsync
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: development
      API_KEY: ${API_KEY:-dev-api-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      FHIR_BASE_URL: ${FHIR_BASE_URL:-https://hapi.fhir.org/baseR4}
      RANDOM_USER_API_URL: ${RANDOM_USER_API_URL:-https://randomuser.me/api/}
      MESSAGING_API_KEY: ${MESSAGING_API_KEY:-}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  flowsync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: flowsync-worker
    environment:
      DATABASE_URL: postgresql://flowsync:flowsync_password@postgres:5432/flowsync
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      API_KEY: ${API_KEY:-dev-api-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      FHIR_BASE_URL: ${FHIR_BASE_URL:-https://hapi.fhir.org/baseR4}
      RANDOM_USER_API_URL: ${RANDOM_USER_API_URL:-https://randomuser.me/api/}
      MESSAGING_API_KEY: ${MESSAGING_API_KEY:-}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker

volumes:
  postgres_data:
  redis_data:
