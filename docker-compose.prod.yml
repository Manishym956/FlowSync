version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowsync-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowsync_prod_pass}
      POSTGRES_DB: ${POSTGRES_DB:-flowsync}
    ports:
      - '5433:5432'
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-flowsync} -d ${POSTGRES_DB:-flowsync}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flowsync-prod-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowsync-prod-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://flowsync:flowsync_prod_pass@postgres:5432/flowsync}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 3001
      NODE_ENV: production
      API_KEY: ${API_KEY:-dev-api-key-change-in-production}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret-change-in-production}
      FHIR_BASE_URL: ${FHIR_BASE_URL:-https://hapi.fhir.org/baseR4}
      RANDOM_USER_API_URL: ${RANDOM_USER_API_URL:-https://randomuser.me/api/}
      RESEND_API_KEY: ${RESEND_API_KEY:-mock-mode}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: node dist/server.js

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowsync-prod-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://flowsync:flowsync_prod_pass@postgres:5432/flowsync}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NODE_ENV: production
      API_KEY: ${API_KEY:-dev-api-key-change-in-production}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret-change-in-production}
      FHIR_BASE_URL: ${FHIR_BASE_URL:-https://hapi.fhir.org/baseR4}
      RANDOM_USER_API_URL: ${RANDOM_USER_API_URL:-https://randomuser.me/api/}
      RESEND_API_KEY: ${RESEND_API_KEY:-mock-mode}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: node dist/worker.js

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowsync-prod-frontend
    ports:
      - '3000:3000'
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-api:3001}
      API_KEY: ${API_KEY:-dev-api-key-change-in-production}
      NODE_ENV: production
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
